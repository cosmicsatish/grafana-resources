apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanacloud-demoinfra-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  resyncPeriod: 0s
  uid: grafanacloud-demoinfra-logs
  datasource:
    name: grafanacloud-demoinfra-logs
    type: loki
    url: https://logs-prod-006.grafana.net
    access: proxy
    uid: grafanacloud-demoinfra-logs
    isDefault: false
    basicAuth: true
    basicAuthUser: ""
  valuesFrom: null
