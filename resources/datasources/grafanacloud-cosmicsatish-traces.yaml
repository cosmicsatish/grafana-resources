apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanacloud-cosmicsatish-traces
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  resyncPeriod: 0s
  uid: grafanacloud-traces
  datasource:
    name: grafanacloud-cosmicsatish-traces
    type: tempo
    url: https://tempo-prod-19-prod-ap-south-1.grafana.net/tempo
    access: proxy
    uid: grafanacloud-traces
    isDefault: false
    basicAuth: true
    basicAuthUser: ""
  valuesFrom: null
