apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanacloud-demoinfra-prom
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  resyncPeriod: 0s
  uid: grafanacloud-demoinfra-prom
  datasource:
    name: grafanacloud-demoinfra-prom
    type: prometheus
    url: https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom
    access: proxy
    uid: grafanacloud-demoinfra-prom
    isDefault: false
    basicAuth: true
    basicAuthUser: ""
  valuesFrom: null
