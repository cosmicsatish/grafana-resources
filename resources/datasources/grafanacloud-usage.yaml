apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanacloud-usage
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  resyncPeriod: 0s
  uid: grafanacloud-usage
  datasource:
    name: grafanacloud-usage
    type: prometheus
    url: https://billing.grafana.net/api/prom
    access: proxy
    uid: grafanacloud-usage
    isDefault: false
    basicAuth: true
    basicAuthUser: ""
  valuesFrom: null
