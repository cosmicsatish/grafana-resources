apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: email-receiver-email
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  resyncPeriod: 0s
  uid: email-receiver-email
  name: email receiver
  receivers:
    - uid: email-receiver-email
      type: email
      disableResolveMessage: false
      settings:
        addresses: <example@email.com>
  valuesFrom: null
